name: Keep backend awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: >
          curl -sf
          --retry 5
          --retry-all-errors
          --retry-delay 20
          --max-time 90
          https://financial-health-screener-api.onrender.com/health
